<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Detox - Instagram</title>
    <script src="../tailwind42.js"></script>
    <link rel="stylesheet" href="popup.css" />
    <link rel="icon" href="../../icons/icon.png" type="image/png" />

    <style>
        .transition-all {
            transition: all 0.2s ease-in-out;
        }

        .toggle-checkbox {
            right: 1.25rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-checkbox:checked {
            right: 0;
            border-color: #eab308; /* yellow-500 */
        }

        .toggle-checkbox:checked+.toggle-label {
            background-color: #facc15; /* yellow-400 */
        }
    </style>
</head>

<body class="m-0 p-3 w-[320px] font-sans bg-[#fefdf6] h-[300px] flex flex-col text-stone-800 selection:bg-yellow-200 select-none">

    <!-- Header -->

    <div class="relative flex items-center justify-between mb-4">

        <a href="/src/ui/popup/popup.html"
            class="p-2 bg-white/80 border border-stone-200/60 rounded-xl hover:bg-yellow-100 hover:text-yellow-700 hover:border-yellow-300 transition duration-200 shadow-sm text-stone-600 focus:outline-none z-10"
            title="Go Back">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5"
                stroke="currentColor" class="w-4 h-4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
        </a>

        <span class="absolute inset-x-0 text-center text-md font-extrabold text-stone-900 tracking-tight">Instagram Blocker</span>

        <a href="../settings/settings.html" class="p-2 bg-white/80 border border-stone-200/60 rounded-xl hover:bg-yellow-100 hover:text-yellow-700 hover:border-yellow-300 transition duration-200 shadow-sm text-stone-600 focus:outline-none z-10"
            title="Settings">

            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                stroke="currentColor" class="w-4.5 h-4.5">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87q.11.06.22.127c.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a8 8 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a7 7 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a7 7 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a7 7 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124q.108-.066.22-.128c.332-.183.582-.495.644-.869z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
            </svg>
        </a>

    </div>

    <!-- Toggles Container -->
    <div class="bg-white border border-stone-200/60 rounded-2xl p-4 space-y-4 shadow-sm">

        <!-- Hide Reels -->
        <label class="flex items-center justify-between cursor-pointer group">
            <span class="text-xs font-bold text-stone-700 group-hover:text-stone-900 transition-colors">Hide Reels</span>
            <div class="relative inline-block w-10">
                <input type="checkbox" id="toggleReels"
                    class="toggle-checkbox absolute w-5 h-5 rounded-full bg-white border-4 border-stone-300 appearance-none cursor-pointer" />
                <label for="toggleReels" class="toggle-label block h-5 rounded-full bg-stone-200 cursor-pointer"></label>
            </div>
        </label>

        <!-- Hide Feed -->
        <label class="flex items-center justify-between cursor-pointer group">
            <span class="text-xs font-bold text-stone-700 group-hover:text-stone-900 transition-colors">Hide Feed</span>
            <div class="relative inline-block w-10">
                <input type="checkbox" id="toggleFeed"
                    class="toggle-checkbox absolute w-5 h-5 rounded-full bg-white border-4 border-stone-300 appearance-none cursor-pointer" />
                <label for="toggleFeed" class="toggle-label block h-5 rounded-full bg-stone-200 cursor-pointer"></label>
            </div>
        </label>

        <!-- Hide Explore -->
        <label class="flex items-center justify-between cursor-pointer group">
            <span class="text-xs font-bold text-stone-700 group-hover:text-stone-900 transition-colors">Hide Explore</span>
            <div class="relative inline-block w-10">
                <input type="checkbox" id="toggleExplore"
                    class="toggle-checkbox absolute w-5 h-5 rounded-full bg-white border-4 border-stone-300 appearance-none cursor-pointer" />
                <label for="toggleExplore"
                    class="toggle-label block h-5 rounded-full bg-stone-200 cursor-pointer"></label>
            </div>
        </label>

        <!-- Hide Stories -->
        <label class="flex items-center justify-between cursor-pointer group">
            <span class="text-xs font-bold text-stone-700 group-hover:text-stone-900 transition-colors">Hide Stories</span>
            <div class="relative inline-block w-10">
                <input type="checkbox" id="toggleStories"
                    class="toggle-checkbox absolute w-5 h-5 rounded-full bg-white border-4 border-stone-300 appearance-none cursor-pointer" />
                <label for="toggleStories"
                    class="toggle-label block h-5 rounded-full bg-stone-200 cursor-pointer"></label>
            </div>
        </label>

    </div>

    <script type="module" src="block-instagram.js"></script>

</body>

</html>

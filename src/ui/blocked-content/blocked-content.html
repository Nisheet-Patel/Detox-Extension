<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detox</title>
  <link rel="icon" href="../../icons/icon.png" type="image/png" />
  <style>
    :root {
      color-scheme: light;
      --bg: #fefdf6; /* cream yellow */
      --text: #1c1917; /* stone-900 */
      --muted: #78716c; /* stone-500 */
      --line: rgba(234, 179, 8, 0.25); /* soft yellow line */
      --button-bg: #facc15; /* yellow-400 */
      --button-bg-hover: #eab308; /* yellow-500 */
      --button-text: #1c1917; /* stone-900 */
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, rgba(254, 240, 138, 0.45), transparent 45%), var(--bg);
      color: var(--text);
      font-family: "Georgia", "Iowan Old Style", "Palatino Linotype", serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .shell {
      width: min(680px, 100%);
      opacity: 0;
      transform: translateY(12px);
      animation: fade-in 360ms ease-out forwards;
    }

    .card {
      padding: clamp(40px, 7vw, 72px);
      border: 1px solid var(--line);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      box-shadow: 0 24px 60px rgba(234, 179, 8, 0.08), 0 4px 24px rgba(28, 25, 23, 0.03);
    }

    .eyebrow {
      margin: 0 0 28px;
      color: #ca8a04; /* yellow-600 */
      font-size: 0.8rem;
      font-weight: 850;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-family: system-ui, -apple-system, sans-serif;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.2rem, 4vw, 3.4rem);
      line-height: 1.1;
      font-weight: 600;
      color: #1c1917;
      letter-spacing: -0.02em;
      max-width: 14ch;
    }

    .lead {
      margin-top: 24px;
      color: var(--muted);
      font-size: clamp(1rem, 1.6vw, 1.12rem);
      line-height: 1.75;
      max-width: 30ch;
    }

    .break {
      display: block;
      margin-top: 14px;
    }

    .footer {
      margin-top: 56px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    .button {
      appearance: none;
      border: 1px solid rgba(234, 179, 8, 0.2);
      border-radius: 999px;
      background: var(--button-bg);
      color: var(--button-text);
      padding: 14px 28px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(250, 204, 21, 0.2);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .button:hover {
      background: var(--button-bg-hover);
      transform: translateY(-1.5px);
      box-shadow: 0 6px 16px rgba(234, 179, 8, 0.35);
    }

    .button:active {
      transform: translateY(0.5px);
    }

    .button:focus-visible {
      outline: 2px solid #eab308;
      outline-offset: 3px;
    }

    @keyframes fade-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="card" aria-label="Blocked content">
      <p class="eyebrow">Detox</p>

      <h1>Detox is doing its job.</h1>

      <p class="lead">
        <span id="surfaceText">This is blocked here.</span>
        <span class="break">You can keep moving.<br>This one can wait.</span>
      </p>

      <div class="footer">
        <button id="goBackButton" class="button" type="button">Go back</button>
      </div>
    </section>
  </main>

  <script src="blocked-content.js"></script>
</body>

</html>

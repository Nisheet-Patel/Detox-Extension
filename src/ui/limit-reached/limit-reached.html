<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detox</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111418;
      --panel: #181c21;
      --text: #f3f4f6;
      --muted: #b6bec8;
      --line: rgba(255, 255, 255, 0.08);
      --button-bg: #232931;
      --button-bg-hover: #2b333d;
      --button-text: #f8fafc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.04), transparent 32%), var(--bg);
      color: var(--text);
      font-family: "Georgia", "Iowan Old Style", "Palatino Linotype", serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .shell {
      width: min(680px, 100%);
      opacity: 0;
      transform: translateY(12px);
      animation: fade-in 360ms ease-out forwards;
    }

    .card {
      padding: clamp(40px, 7vw, 72px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.015));
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
    }

    .eyebrow {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.08;
      font-weight: 500;
      letter-spacing: -0.03em;
      max-width: 12ch;
    }

    .lead {
      margin-top: 24px;
      color: var(--muted);
      font-size: clamp(1rem, 1.6vw, 1.12rem);
      line-height: 1.75;
      max-width: 30ch;
    }

    .break {
      display: block;
      margin-top: 14px;
    }

    .footer {
      margin-top: 56px;
      padding-top: 28px;
      border-top: 1px solid var(--line);
    }

    .button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      background: var(--button-bg);
      color: var(--button-text);
      padding: 12px 18px;
      font: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background-color 140ms ease, transform 140ms ease;
    }

    .button:hover {
      background: var(--button-bg-hover);
      transform: translateY(-1px);
    }

    .button:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.3);
      outline-offset: 3px;
    }

    @keyframes fade-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="card" aria-label="Limit reached">
      <p class="eyebrow">Detox</p>

      <h1>Detox is doing its job.</h1>

      <p class="lead">
        You’ve hit your time budget for this site.
        <span class="break">The scroll can wait.<br>Your time can’t.</span>
        <span class="break">See you tomorrow.</span>
      </p>

      <div class="footer">
        <button id="goBackButton" class="button" type="button">Go back</button>
      </div>
    </section>
  </main>

  <script src="limit-reached.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Detox</title>
  <script src="../tailwind42.js"></script>
  <link rel="stylesheet" href="popup.css" />
</head>

<body class="m-0 p-3 w-[320px] font-sans bg-gray-50">

  <div class="flex items-center justify-between mb-3">

    <!-- Logo -->
    <span class="text-2xl font-semibold text-gray-800">Detox</span>

    <!-- Settings Button -->
    <button id="openSettings" class="p-1.5 rounded-md hover:bg-gray-100 transition" title="Settings">

      <!-- Gear Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="size-6 w-5 h-5 text-gray-600">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87q.11.06.22.127c.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a8 8 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a7 7 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a7 7 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a7 7 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124q.108-.066.22-.128c.332-.183.582-.495.644-.869z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
      </svg>
    </button>

  </div>


  <div class="h-px bg-gray-200 mt-2"></div>

  <div class="container">
    <div id="totalTime" class="text-xl font-semibold text-gray-800 mb-2"></div>
    <div id="chart" class="stacked-horizontal-bar"></div>
  </div>


  <div class="h-px bg-gray-200"></div>


  <div class="relative mt-3">

    <h3 class="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">
      Advance Blocking
    </h3>

    <!-- LEFT ARROW -->
    <button id="leftBtn" class="hidden absolute left-0 top-1/2 -translate-y-1/2 bg-white shadow rounded-full p-1 z-10">

      <!-- left icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
      </svg>
    </button>

    <!-- RIGHT ARROW -->
    <button id="rightBtn"
      class="hidden absolute right-0 top-1/2 -translate-y-1/2 bg-white shadow rounded-full p-1 z-10">

      <!-- right icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
      </svg>
    </button>

    <!-- SCROLL AREA -->
    <div id="scrollContainer" class="flex gap-3 overflow-x-auto no-scrollbar pb-1">

      <!-- ICON ITEM -->
      <a class="min-w-[56px] h-[56px] flex items-center justify-center bg-gray-100 rounded-lg" href="/src/ui/block-website/block-website.html">
        <img src="../icons/blockweb.svg" class="w-7 h-7">
      </a>

      <a class="min-w-[56px] h-[56px] flex items-center justify-center bg-gray-100 rounded-lg" href="/src/ui/block-instagram/block-instagram.html">
        <img src="../icons/instagram.svg" class="w-7 h-7">
      </a>

      <a class="min-w-[56px] h-[56px] flex items-center justify-center bg-gray-100 rounded-lg" href="/src/ui/block-youtube/block-youtube.html">
        <img src="../icons/youtube.svg" class="w-7 h-7">
      </a>

    </div>
  </div>

  <div class="h-px bg-gray-200 mt-3"></div>

  <!-- BLOCK INPUT COMPONENT -->
  <div class="mt-3">

    <!-- INPUT + BUTTON -->
    <div class="flex gap-2">
      <input id="blockInput" type="text" placeholder="Block (e.g. youtube.com)"
        class="flex-1 px-3 py-2 text-sm border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" />

      <button id="blockBtn" class="px-3 py-2 text-sm bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
        Block
      </button>
    </div>

    <!-- CHIPS -->
    <div class="flex gap-2 mt-2">

      <button id="blockCurrent" class="text-xs px-2 py-1 bg-gray-100 rounded hover:bg-gray-200 transition">
        + This Site
      </button>

      <button id="clearInput" class="text-xs px-2 py-1 bg-gray-100 rounded hover:bg-gray-200 transition">
        Clear
      </button>

    </div>

  </div>

  <script type="module" src="../../vendor/browser-polyfill.min.js"></script>
  <script type="module" src="popup.js"></script>

</body>

</html>

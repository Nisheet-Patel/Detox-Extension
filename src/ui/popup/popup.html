<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Detox</title>
  <script src="../tailwind42.js"></script>
  <link rel="stylesheet" href="popup.css" />
</head>

<body class="m-0 p-3 w-[320px] font-sans bg-[#fefdf6] text-stone-800 selection:bg-yellow-200 select-none">

  <div class="flex items-center justify-between mb-3.5">

    <!-- Logo -->
    <div class="flex items-center gap-2">
      <span class="flex h-2.5 w-2.5 relative">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-yellow-500"></span>
      </span>
      <span class="text-2xl font-extrabold tracking-tight text-stone-900">Detox</span>
    </div>

    <!-- Settings Button -->
    <button id="openSettings" class="p-2 rounded-xl bg-white/80 border border-stone-200/60 text-stone-600 hover:bg-yellow-100 hover:text-yellow-700 hover:border-yellow-300 transition duration-200 shadow-sm" title="Settings">

      <!-- Gear Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
        class="w-4.5 h-4.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87q.11.06.22.127c.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a8 8 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a7 7 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a7 7 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a7 7 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124q.108-.066.22-.128c.332-.183.582-.495.644-.869z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0" />
      </svg>
    </button>

  </div>


  <div class="h-px bg-stone-200/50 my-3"></div>

  <div class="bg-white border border-stone-200/60 rounded-2xl p-3 shadow-sm mb-3.5">
    <div class="flex items-baseline justify-between mb-2.5">
      <span class="text-[10px] font-bold uppercase tracking-wider text-stone-500">Screen Time Today</span>
      <div id="totalTime" class="text-xl font-extrabold text-stone-900 tracking-tight">0s</div>
    </div>
    <div id="chart" class="stacked-horizontal-bar"></div>
  </div>


  <div class="h-px bg-stone-200/50 my-3"></div>


  <div class="relative mt-3.5">

    <h3 class="text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-2.5">
      Advance Filters
    </h3>

    <!-- LEFT ARROW -->
    <button id="leftBtn" class="hidden absolute left-0 top-[42%] -translate-y-1/2 bg-white/95 border border-stone-200/80 shadow-md rounded-full p-1.5 z-10 hover:bg-yellow-50 text-stone-700 hover:text-yellow-600 transition">

      <!-- left icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
        class="w-3.5 h-3.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
      </svg>
    </button>

    <!-- RIGHT ARROW -->
    <button id="rightBtn"
      class="hidden absolute right-0 top-[42%] -translate-y-1/2 bg-white/95 border border-stone-200/80 shadow-md rounded-full p-1.5 z-10 hover:bg-yellow-50 text-stone-700 hover:text-yellow-600 transition">

      <!-- right icon -->
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
        class="w-3.5 h-3.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
      </svg>
    </button>

    <!-- SCROLL AREA -->
    <div id="scrollContainer" class="flex gap-2.5 overflow-x-auto no-scrollbar pb-1">

      <a class="flex-1 min-w-[84px] py-3 flex flex-col items-center justify-center bg-white border border-stone-200/60 rounded-2xl hover:border-yellow-400 hover:bg-yellow-50/20 transition duration-200 group shadow-sm" href="/src/ui/block-website/block-website.html">
        <div class="p-2 bg-stone-50 rounded-xl group-hover:bg-yellow-100 transition-colors mb-1.5">
          <img src="../icons/blockweb.svg" class="w-6 h-6">
        </div>
        <span class="text-[10px] font-bold text-stone-600 group-hover:text-stone-900 transition-colors">Websites</span>
      </a>

      <a class="flex-1 min-w-[84px] py-3 flex flex-col items-center justify-center bg-white border border-stone-200/60 rounded-2xl hover:border-yellow-400 hover:bg-yellow-50/20 transition duration-200 group shadow-sm" href="/src/ui/block-instagram/block-instagram.html">
        <div class="p-2 bg-stone-50 rounded-xl group-hover:bg-yellow-100 transition-colors mb-1.5">
          <img src="../icons/instagram.svg" class="w-6 h-6">
        </div>
        <span class="text-[10px] font-bold text-stone-600 group-hover:text-stone-900 transition-colors">Instagram</span>
      </a>

      <a class="flex-1 min-w-[84px] py-3 flex flex-col items-center justify-center bg-white border border-stone-200/60 rounded-2xl hover:border-yellow-400 hover:bg-yellow-50/20 transition duration-200 group shadow-sm" href="/src/ui/block-youtube/block-youtube.html">
        <div class="p-2 bg-stone-50 rounded-xl group-hover:bg-yellow-100 transition-colors mb-1.5">
          <img src="../icons/youtube.svg" class="w-6 h-6">
        </div>
        <span class="text-[10px] font-bold text-stone-600 group-hover:text-stone-900 transition-colors">YouTube</span>
      </a>

    </div>
  </div>

  <div class="h-px bg-stone-200/50 my-3.5"></div>

  <!-- BLOCK INPUT COMPONENT -->
  <div class="mt-3">

    <!-- INPUT + BUTTON -->
    <div class="flex gap-1.5">
      <input id="blockInput" type="text" placeholder="Block (e.g. youtube.com)"
        class="flex-1 px-3 py-2 text-xs border border-stone-200/80 rounded-xl outline-none focus:border-yellow-400 focus:ring-1 focus:ring-yellow-400 bg-white placeholder-stone-400 transition" />

      <button id="blockBtn" class="px-4 py-2 text-xs font-bold bg-yellow-400 text-stone-900 rounded-xl hover:bg-yellow-500 active:scale-95 transition-all duration-150 shadow-sm border border-yellow-500/20">
        Block
      </button>
    </div>

    <!-- CHIPS -->
    <div class="flex gap-1.5 mt-2">

      <button id="blockCurrent" class="text-[10px] font-semibold px-2.5 py-1 bg-white border border-stone-200 rounded-lg hover:bg-yellow-50 hover:border-yellow-300 hover:text-yellow-700 active:scale-95 transition-all duration-150">
        + This Site
      </button>

      <button id="clearInput" class="text-[10px] font-semibold px-2.5 py-1 bg-white border border-stone-200 rounded-lg hover:bg-stone-50 hover:text-stone-700 active:scale-95 transition-all duration-150">
        Clear
      </button>

    </div>

  </div>

  <script type="module" src="../../vendor/browser-polyfill.min.js"></script>
  <script type="module" src="popup.js"></script>

</body>

</html>
